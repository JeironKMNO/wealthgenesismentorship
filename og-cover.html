<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=JetBrains+Mono:wght@500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; }
    body {
      width: 1200px;
      height: 630px;
      background:
        radial-gradient(ellipse 55% 85% at 84% 48%, rgba(201,165,90,0.16), transparent 62%),
        radial-gradient(ellipse 40% 60% at 12% 60%, rgba(200,205,212,0.06), transparent 60%),
        #080705;
      display: flex;
      align-items: center;
      gap: 60px;
      padding: 70px 84px;
      font-family: 'Syne', system-ui, sans-serif;
      color: #EDE8DF;
      position: relative;
      overflow: hidden;
    }
    .frame {
      position: absolute;
      inset: 26px;
      border: 1px solid rgba(201,165,90,0.22);
      pointer-events: none;
    }
    .frame::after {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(201,165,90,0.08);
    }
    .logo {
      height: 430px;
      width: auto;
      flex-shrink: 0;
      filter: drop-shadow(0 10px 44px rgba(201,165,90,0.14));
    }
    .content { display: flex; flex-direction: column; gap: 22px; }
    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #C9A55A;
    }
    .headline {
      font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      font-size: 68px;
      font-weight: 700;
      line-height: 1.02;
      letter-spacing: -0.01em;
      color: #EDE8DF;
    }
    .headline em { font-style: italic; font-weight: 400; color: #DFC280; }
    .accent {
      width: 84px;
      height: 2px;
      background: linear-gradient(90deg, #C9A55A, #E6E9EE, #DFC280);
    }
    .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: rgba(237,232,223,0.72);
    }
    .url {
      position: absolute;
      bottom: 42px;
      right: 84px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(237,232,223,0.4);
    }
  </style>
</head>
<body>
  <div class="frame"></div>
  <img class="logo" src="assets/images/logo-full.png" alt="" />
  <div class="content">
    <div class="eyebrow">Academia de Trading Profesional</div>
    <div class="headline">De Cero a<br /><em>Operar con Estructura</em></div>
    <div class="accent"></div>
    <div class="sub">Futuros del Nasdaq (NQ) &amp; Oro (GC)</div>
  </div>
  <div class="url">wealthgenesismentorship.com</div>
</body>
</html>
